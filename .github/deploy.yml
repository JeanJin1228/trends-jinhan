name: 采集热点 & 部署仪表盘

on:
  schedule:
    # 北京时间 08:00-22:00 每2小时 (UTC = CN-8)
    - cron: '0 0,2,4,6,8,10,12,14 * * *'
  workflow_dispatch:  # 支持手动触发
  push:
    branches: [main]

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 采集热点数据
        run: python collect.py

      - name: 部署到 surge.sh
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          npx surge --project . --domain trends-jinhan.surge.sh
